[project]
name = "Cardio Catch Disease"
slug = "03_cardio_catch_disease"
family = "cardio"
problem_type = "binary_classification"
business_goal = "Prever risco cardiovascular e comparar a precisao contra o diagnostico manual."
primary_metric = "ROC AUC, recall, precision, F1 e impacto financeiro por faixa de acuracia"

[data]
train_file = "data/raw/cardio_train.csv"
target = "cardio"
positive_label = 1
id_columns = ["id"]
drop_columns = []

[modeling]
class_weight = "balanced"
test_size = 0.2
random_state = 42
max_iter = 1000
model_file = "models/model.joblib"

[evaluation]
top_k = [1000, 5000]
